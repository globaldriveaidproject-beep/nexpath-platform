<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI Humanitarian Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0b1220, #000);
      color: white;
      overflow-x: hidden;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px;
      min-height: 100vh;
    }

    .left {
      max-width: 500px;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
    }

    .subtitle {
      color: #9ca3af;
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .globe {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
      background-size: cover;
      box-shadow: 0 0 60px #3b82f6;
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .mission {
      padding: 60px;
      background: rgba(255,255,255,0.03);
      margin: 40px;
      border-radius: 15px;
    }

    .input-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 40px;
    }

    input, textarea {
      width: 400px;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="left">
    <div class="title">NexPath AI</div>
    <div class="title">Humanitarian Engine</div>

    <div class="subtitle">
      AI-powered global humanitarian response system connecting people in crisis with immediate support.
    </div>

    <button class="btn">Submit Request</button>
  </div>

  <div class="globe"></div>

</div>

<!-- MISSION -->
<div class="mission">
  <h2>Our Mission</h2>
  <p>
    Mankind Global / Helping Hand Community founded by Tidimalo Konate.
  </p>
  <p>
    We provide food, water, shelter, and medical aid worldwide.
  </p>
</div>

<!-- INPUT -->
<div class="input-box">
  <input placeholder="Email (optional)">
  <textarea placeholder="Describe your situation..."></textarea>
  <button class="btn">Submit Request</button>
</div>

</body>
</html>
