<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Living World Intelligence</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
    }

    #globe {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 350px;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #00ffe1;
    }

    .card {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .popup {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 300px;
      background: rgba(0,0,0,0.85);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #00ffe1;
      display: none;
      z-index: 20;
    }

    .heat {
      font-size: 12px;
      margin-top: 5px;
      color: #ff6666;
    }
  </style>
</head>

<body>

<div id="globe"></div>

<!-- PANEL -->
<div class="panel">

  <div class="title">🌍 NexPath AI Living System</div>
  <div>Global Intelligence Engine Active</div>

  <hr>

  <div class="card">Global Impact: <span id="impact">147</span></div>
  <div class="card">Aid Delivered: <span id="aid">56</span></div>
  <div class="card">Active Regions: <span id="regions">12</span></div>

  <hr>

  <div class="card" onclick="triggerAI('UAE','CRITICAL')">
    UAE - Food Crisis (CRITICAL)
  </div>

  <div class="card" onclick="triggerAI('Kenya','HIGH')">
    Kenya - Education Need (HIGH)
  </div>

  <div class="card" onclick="triggerAI('France','LOW')">
    France - Volunteers Needed (LOW)
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<!-- GLOBE -->
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

<script>

const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.6;

/* 🌍 CRISIS DATA */
const crises = [
  { name:"UAE", lat:25.276987, lng:55.296249, level:"CRITICAL", heat:1.0 },
  { name:"Kenya", lat:-1.2921, lng:36.8219, level:"HIGH", heat:0.7 },
  { name:"France", lat:48.8566, lng:2.3522, level:"LOW", heat:0.4 }
];

world.pointsData(crises)
  .pointAltitude(d => 0.15 + Math.sin(Date.now()*0.002)*0.03)
  .pointColor(d => {
    if(d.level === "CRITICAL") return "red";
    if(d.level === "HIGH") return "orange";
    return "yellow";
  });

/* 🌡️ LIVING HEAT SYSTEM */
setInterval(() => {

  world.pointsData(crises.map(c => ({
    ...c,
    heat: c.heat + (Math.random() * 0.02 - 0.01)
  })));

}, 200);

/* 🧠 AI ENGINE */
function triggerAI(region, level) {

  const popup = document.getElementById("popup");
  popup.style.display = "block";

  const analysis = generateAI(region, level);

  popup.innerHTML = `
    <b>${region}</b><br><br>
    Severity: ${level}<br><br>
    <div class="heat">🧠 AI ANALYSIS</div>
    ${analysis}
  `;
}

/* 🧠 MULTI-LAYER AI REASONING */
function generateAI(region, level) {

  if(level === "CRITICAL") {
    return `
    Cause: High population demand + supply chain stress<br>
    Effect: Immediate food shortage risk<br>
    Recommendation: Deploy emergency aid + logistics response
    `;
  }

  if(level === "HIGH") {
    return `
    Cause: Infrastructure gap detected<br>
    Effect: Education service delay<br>
    Recommendation: Resource redistribution + NGO support
    `;
  }

  return `
  Cause: Low volunteer engagement<br>
  Effect: Reduced support coverage<br>
  Recommendation: Awareness + recruitment drive
  `;
}

/* 📊 LIVE DASHBOARD */
setInterval(() => {
  document.getElementById("impact").innerText = 147 + Math.floor(Math.random()*5);
  document.getElementById("aid").innerText = 56 + Math.floor(Math.random()*2);
  document.getElementById("regions").innerText = 12;
}, 2000);

</script>

</body>
</html>
