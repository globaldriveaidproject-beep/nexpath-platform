<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Live Humanitarian System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #050816, #000);
      color: white;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      padding: 40px;
    }

    .left { max-width: 500px; }

    .title {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(90deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #globeViz { width: 500px; height: 500px; }

    .form {
      margin: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input, textarea {
      width: 350px;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    .admin {
      margin: 40px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="left">
    <div class="title">NexPath AI</div>
    <div class="title">Live Humanitarian System</div>

    <button class="btn">System Active</button>
  </div>

  <div id="globeViz"></div>
</div>

<!-- REQUEST FORM -->
<div class="form">
  <h2>Request Help</h2>
  <input id="email" placeholder="Email (optional)">
  <textarea id="message" placeholder="Describe your situation..."></textarea>
  <button class="btn" onclick="submitRequest()">Submit</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
  <h2>Live Requests (Admin)</h2>
  <div id="requests"></div>
</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitRequest = async function () {
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (!message) {
    alert("Please enter your situation");
    return;
  }

  await addDoc(collection(db, "requests"), {
    email,
    message,
    timestamp: new Date()
  });

  alert("Request submitted successfully");

  loadRequests();
};

async function loadRequests() {
  const container = document.getElementById("requests");
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "requests"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>Email:</b> ${data.email || "N/A"} <br>
      <b>Message:</b> ${data.message}
    `;

    container.appendChild(div);
  });
}

loadRequests();

</script>

<script>
  const world = Globe()(document.getElementById('globeViz'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg');

  world.controls().autoRotate = true;
</script>

</body>
</html>
