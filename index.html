<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Operating System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #050814, #000);
      color: white;
      overflow-x: hidden;
    }

    /* HEADER STATUS */
    .topbar {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 260px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
    .yellow { background: #facc15; box-shadow: 0 0 10px #facc15; }
    .red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

    /* HERO */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
    }

    .left {
      max-width: 520px;
    }

    .title {
      font-size: 54px;
      font-weight: bold;
      background: linear-gradient(90deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #9ca3af;
      margin-top: 10px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 18px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    /* GLOBE */
    #globeViz {
      width: 520px;
      height: 520px;
      border-radius: 50%;
      box-shadow: 0 0 90px rgba(59,130,246,0.5);
      overflow: hidden;
    }

    /* LIVE FEED */
    .feed {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 320px;
      height: 220px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      font-size: 12px;
      overflow: hidden;
    }

    .event {
      margin: 6px 0;
      animation: fade 1s ease-in;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* IMPACT COUNTER */
    .impact {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 220px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      font-size: 12px;
    }

    .big {
      font-size: 20px;
      font-weight: bold;
      color: #60a5fa;
    }
  </style>
</head>

<body>

<!-- TOP STATUS -->
<div class="topbar">
  <div><span class="dot green"></span>AI CORE: ACTIVE</div>
  <div><span class="dot yellow"></span>GLOBAL SCAN: RUNNING</div>
  <div><span class="dot red"></span>CRISIS LEVEL: ELEVATED</div>
</div>

<!-- LIVE FEED -->
<div class="feed">
  <b>Live Intelligence Feed</b>
  <div id="feed"></div>
</div>

<!-- IMPACT COUNTER -->
<div class="impact">
  <b>Global Impact</b>
  <div class="big" id="people">0</div>
  People Assisted
</div>

<!-- HERO -->
<div class="hero">

  <div class="left">
    <div class="title">NexPath AI</div>
    <div class="title">Operating System</div>

    <div class="subtitle">
      Autonomous humanitarian intelligence system simulating global crisis detection, aid routing, and real-time impact tracking across nations.
    </div>

    <button class="btn">Initialize Core</button>
  </div>

  <div id="globeViz"></div>

</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
  const world = Globe()
    (document.getElementById('globeViz'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png');

  world.width(520);
  world.height(520);

  // 🌍 AI DATA NODES
  let points = [
    { lat: 25.276987, lng: 55.296249, size: 0.6, color: 'red', label: 'Dubai Core' },
    { lat: -1.2921, lng: 36.8219, size: 0.7, color: 'red', label: 'Africa Crisis Zone' },
    { lat: 51.5072, lng: -0.1276, size: 0.5, color: 'yellow', label: 'UK Monitoring' }
  ];

  world
    .pointsData(points)
    .pointAltitude('size')
    .pointColor('color')
    .pointLabel('label');

  // 🌐 GLOBAL ROUTING
  world.arcsData([
    {
      startLat: 25.276987,
      startLng: 55.296249,
      endLat: -1.2921,
      endLng: 36.8219,
      color: ['#ff0000', '#ff8800']
    }
  ])
  .arcDashLength(0.5)
  .arcDashGap(2)
  .arcDashAnimateTime(2000);

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.6;

  // 📡 LIVE FEED SYSTEM
  const feed = document.getElementById("feed");
  const events = [
    "AI: Food shortage detected in East Africa",
    "AI: Emergency request from Dubai processed",
    "AI: Aid route established via UK hub",
    "AI: High-risk displacement pattern detected",
    "AI: Global scan cycle completed"
  ];

  let i = 0;
  setInterval(() => {
    const div = document.createElement("div");
    div.className = "event";
    div.innerText = events[i % events.length];
    feed.prepend(div);

    if (feed.children.length > 7) feed.removeChild(feed.lastChild);

    i++;
  }, 1800);

  // 💰 IMPACT COUNTER
  let people = 0;
  setInterval(() => {
    people += Math.floor(Math.random() * 50 + 10);
    document.getElementById("people").innerText = people.toLocaleString();
  }, 2000);

  // 🔴 DYNAMIC CRISIS SIGNALS
  setInterval(() => {
    points.push({
      lat: 20 + Math.random() * 30,
      lng: 10 + Math.random() * 60,
      size: 0.5,
      color: 'red',
      label: 'New AI Detected Signal'
    });

    world.pointsData(points);
  }, 6000);

</script>

</body>
</html>
