<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Fixed Globe</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
      color: white;
    }

    #globe {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      z-index: 10;
    }

    .title {
      color: #00ffe1;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      margin-top: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="globe"></div>

<div class="ui">
  <div class="title">NexPath AI</div>
  <div>Live Humanitarian System</div>

  <div class="card">Global Impact: 141</div>
  <div class="card">Aid Delivered: 56</div>
  <div class="card">Active Regions: 12</div>

  <div class="card">Food crisis UAE</div>
  <div class="card">Education support</div>
  <div class="card">Medical aid request</div>
</div>

<!-- ✅ ONLY ONE SAFE GLOBE LIBRARY -->
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

<script>
const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.6;

world.pointsData([
  { lat: 25.276987, lng: 55.296249, size: 0.5, color: 'red' },
  { lat: 0, lng: 0, size: 0.5, color: 'blue' }
])
.pointAltitude('size')
.pointColor('color');
</script>

</body>
</html>
