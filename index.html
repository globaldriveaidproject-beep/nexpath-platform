<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px">

<h1>🌍 NexPath AI</h1>
<p>Global Humanitarian System</p>

<textarea id="input" placeholder="Describe your situation..." style="width:300px;height:120px"></textarea>

<br><br>

<button onclick="submitRequest()">Submit Request</button>

<p id="output"></p>

<script type="module">
import { sendRequest, getPriority } from "./app.js";

window.submitRequest = async function () {
  let text = document.getElementById("input").value;

  if (!text) return;

  // 1. Get AI priority
  let priority = getPriority(text);

  // 2. Send to Firebase
  await sendRequest(text);

  // 3. Show response
  document.getElementById("output").innerText =
    "Request sent ✔ Priority: " + priority;
};
</script>

</body>
</html>
