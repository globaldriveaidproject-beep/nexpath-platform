<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Global Heat Intelligence System</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
    }

    #globe {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 350px;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #00ffe1;
    }

    .card {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .popup {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 300px;
      background: rgba(0,0,0,0.85);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #00ffe1;
      display: none;
      z-index: 20;
    }

    .heat {
      color: #ff5555;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div id="globe"></div>

<!-- PANEL -->
<div class="panel">

  <div class="title">🌍 NexPath AI Heat Engine</div>
  <div>Living Global Intelligence System</div>

  <hr>

  <div class="card">Global Impact: <span id="impact">149</span></div>
  <div class="card">Aid Delivered: <span id="aid">57</span></div>
  <div class="card">Active Regions: <span id="regions">12</span></div>

  <hr>

  <div class="card" onclick="openAI('UAE','CRITICAL')">
    UAE - Food Crisis (CRITICAL)
  </div>

  <div class="card" onclick="openAI('Kenya','HIGH')">
    Kenya - Education Need (HIGH)
  </div>

  <div class="card" onclick="openAI('France','LOW')">
    France - Volunteers Needed (LOW)
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<!-- GLOBE -->
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

<script>

const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.6;

/* 🌍 CRISIS HEAT SYSTEM */
let crises = [
  { name:"UAE", lat:25.276987, lng:55.296249, level:"CRITICAL", heat:1.0 },
  { name:"Kenya", lat:-1.2921, lng:36.8219, level:"HIGH", heat:0.7 },
  { name:"France", lat:48.8566, lng:2.3522, level:"LOW", heat:0.4 }
];

/* 🌡️ HEAT VISUALIZATION */
function render() {

  world.pointsData(crises)
    .pointAltitude(d => 0.15 + d.heat * 0.1)
    .pointColor(d => {

      if (d.heat > 0.85) return "red";
      if (d.heat > 0.6) return "orange";
      return "yellow";

    });
}

/* 🔥 LIVING HEAT ENGINE */
function updateHeat() {

  crises = crises.map(c => {

    let change = (Math.random() * 0.04 - 0.02);
    let newHeat = Math.min(1, Math.max(0.2, c.heat + change));

    return { ...c, heat: newHeat };
  });

  render();
}

/* 🧠 AI POPUP */
function openAI(region, level) {

  const popup = document.getElementById("popup");
  popup.style.display = "block";

  popup.innerHTML = `
    <b>${region}</b><br><br>
    Severity: ${level}
    <div class="heat">🧠 AI ANALYSIS</div>
    ${generateAI(level)}
  `;
}

/* 🧠 AI LOGIC */
function generateAI(level) {

  if(level === "CRITICAL") {
    return "Supply chain collapse risk detected → Immediate humanitarian deployment required";
  }

  if(level === "HIGH") {
    return "Resource gap detected → NGO + donor coordination recommended";
  }

  return "Low urgency → Volunteer network activation suggested";
}

/* 📊 LIVE METRICS */
setInterval(() => {

  document.getElementById("impact").innerText = 149 + Math.floor(Math.random()*5);
  document.getElementById("aid").innerText = 57 + Math.floor(Math.random()*2);
  document.getElementById("regions").innerText = 12;

}, 2000);

/* 🌡️ HEAT LOOP (IMPORTANT) */
setInterval(updateHeat, 300);

/* INITIAL RENDER */
render();

</script>

</body>
</html>
