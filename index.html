<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath AI Interactive System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  background: black;
  overflow: hidden;
}

#globe-container {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,255,255,0.1), black);
  z-index: -1;
}

.container {
  padding: 30px;
}

.header {
  display: flex;
  justify-content: space-between;
}

.logo { color: cyan; font-size: 22px; }

.hero h1 { color: cyan; }

.panel {
  position: absolute;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(0,255,255,0.3);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 15px;
}

.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

.critical { color: red; }
.high { color: orange; }
.low { color: lime; }

</style>
</head>

<body>

<div id="globe-container"></div>

<div class="container">
  <div class="header">
    <div class="logo">🌍 NexPath AI</div>
    <div>Live System</div>
  </div>

  <div class="hero">
    <h1>Interactive Global Intelligence</h1>
    <p>Click anywhere on the globe to trigger AI analysis.</p>
  </div>
</div>

<!-- 📊 Stats -->
<div class="panel top-right">
  <div>Impact: <span id="impact">157</span></div>
  <div>Aid: <span id="aid">58</span></div>
  <div>Regions: <span id="regions">12</span></div>
</div>

<!-- 🚨 Crisis -->
<div class="panel bottom-left" id="crisisPanel">
  <div class="critical">UAE – Food Crisis</div>
  <div class="high">Kenya – Education</div>
  <div class="low">France – Volunteers</div>
</div>

<!-- 🧠 AI -->
<div class="panel bottom-right" id="aiPanel">
  <b>AI STATUS: ACTIVE</b>
  <p>Click globe to analyze region...</p>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("globe-container").appendChild(renderer.domElement);

/* Earth */
const geometry = new THREE.SphereGeometry(5, 64, 64);
const texture = new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg");

const material = new THREE.MeshStandardMaterial({ map: texture });
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

/* Light */
const light = new THREE.PointLight(0x00ffff, 2);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 10;

/* AI DATA */
const regions = [
  { name: "UAE", level: "CRITICAL", msg: "Food supply stress detected. Immediate response required." },
  { name: "Kenya", level: "HIGH", msg: "Education system under pressure. NGO coordination needed." },
  { name: "France", level: "LOW", msg: "Volunteer demand increasing gradually." }
];

/* CLICK DETECTION */
window.addEventListener("click", () => {

  const randomRegion = regions[Math.floor(Math.random()*regions.length)];

  document.getElementById("aiPanel").innerHTML = `
    <b>${randomRegion.name}</b><br><br>
    Severity: ${randomRegion.level}<br><br>
    🧠 AI ANALYSIS:<br>
    ${randomRegion.msg}
  `;

});

/* Animate */
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();

/* Resize */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
