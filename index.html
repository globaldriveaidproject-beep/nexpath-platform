<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
    background: black;
}

/* Globe background */
#globe-container {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* UI overlay */
.overlay {
    position: relative;
    z-index: 10;
    padding: 20px;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
}

nav h1 {
    color: cyan;
}

/* DASHBOARD */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid cyan;
}

.critical { color: red; }
.high { color: orange; }
.low { color: lime; }

</style>
</head>

<body>

<div id="globe-container"></div>

<div class="overlay">

<nav>
    <h1>🌍 NexPath AI</h1>
    <div>Home | Mission | Donate</div>
</nav>

<h2>Global Intelligence System</h2>

<div class="dashboard">

<div class="card">
<h3>Global Impact</h3>
<p>157</p>
</div>

<div class="card">
<h3>Aid Delivered</h3>
<p>58</p>
</div>

<div class="card">
<h3>Active Regions</h3>
<p>12</p>
</div>

<div class="card">
<h3>Global Pressure</h3>
<p>71 / 100</p>
</div>

</div>

<div class="dashboard">

<div class="card critical">UAE - Food Crisis</div>
<div class="card high">Kenya - Education</div>
<div class="card low">France - Volunteers</div>

</div>

</div>

<!-- ✅ CLEAN THREE.JS (NO CONFLICT) -->
<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("globe-container").appendChild(renderer.domElement);

/* Earth */
const geometry = new THREE.SphereGeometry(5, 64, 64);

const texture = new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/earth_atmos_2048.jpg"
);

const material = new THREE.MeshStandardMaterial({
map: texture
});

const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

/* Light */
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10, 10, 10);
scene.add(light);

/* Crisis markers */
function createMarker(color, lat, lon) {
    const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 16, 16),
        new THREE.MeshBasicMaterial({ color })
    );

    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);

    marker.position.set(
        -5 * Math.sin(phi) * Math.cos(theta),
        5 * Math.cos(phi),
        5 * Math.sin(phi) * Math.sin(theta)
    );

    scene.add(marker);
}

/* UAE, Kenya, France */
createMarker(0xff0000, 25.2, 55.3);
createMarker(0xffaa00, -1.2, 36.8);
createMarker(0x00ff00, 46.2, 2.2);

camera.position.z = 10;

/* Animation */
function animate() {
    requestAnimationFrame(animate);
    globe.rotation.y += 0.002;
    renderer.render(scene, camera);
}

animate();

/* Resize fix */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
