<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI System</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px">

<h1>🌍 NexPath AI Humanitarian Engine</h1>
<p>Global intelligent crisis detection system</p>

<input id="email" placeholder="Email (optional)" style="width:300px;padding:10px"><br><br>
<textarea id="input" placeholder="Describe situation..." style="width:300px;height:120px"></textarea>

<br><br>

<button onclick="submitRequest()">Submit Request</button>

<p id="output"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🧠 AI SCORING ENGINE
function calculateUrgency(text) {
  let score = 0;

  if (text.includes("emergency")) score += 40;
  if (text.includes("urgent")) score += 30;
  if (text.includes("no food") || text.includes("hungry")) score += 25;
  if (text.includes("homeless") || text.includes("shelter")) score += 35;
  if (text.includes("sick") || text.includes("hospital")) score += 40;
  if (text.includes("child")) score += 30;

  return Math.min(score, 100);
}

// 💡 AI RESPONSE SUGGESTION
function getSuggestion(text) {
  if (text.includes("food") || text.includes("hungry")) return "Food Aid Required";
  if (text.includes("water")) return "Water Aid Required";
  if (text.includes("sick") || text.includes("hospital")) return "Medical Assistance Required";
  if (text.includes("homeless") || text.includes("shelter")) return "Emergency Shelter Required";
  return "General Support Needed";
}

// 🌍 MAIN FUNCTION
window.submitRequest = async function () {

  let text = document.getElementById("input").value.toLowerCase();
  let email = document.getElementById("email").value;

  let urgencyScore = calculateUrgency(text);
  let suggestion = getSuggestion(text);

  let priority =
    urgencyScore >= 70 ? "CRITICAL" :
    urgencyScore >= 40 ? "HIGH" : "LOW";

  try {
    await addDoc(collection(db, "requests"), {
      message: text,
      email: email || "anonymous",
      priority: priority,
      urgencyScore: urgencyScore,
      suggestion: suggestion,
      status: "pending",
      createdAt: Date.now()
    });

    document.getElementById("input").value = "";

    document.getElementById("output").innerHTML =
      "🌍 Submitted!<br>" +
      "Priority: " + priority + "<br>" +
      "AI Score: " + urgencyScore + "/100<br>" +
      "Suggestion: " + suggestion;

  } catch (e) {
    document.getElementById("output").innerText =
      "❌ Error submitting request";
  }
};

</script>

</body>
</html>
