<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Global System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      overflow: hidden;
      color: white;
    }

    /* 🌍 FULLSCREEN GLOBE */
    #globeBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* 🧊 GLASS UI */
    .panel {
      backdrop-filter: blur(15px);
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 20px;
      margin: 20px;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(90deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<!-- 🌍 BACKGROUND -->
<div id="globeBg"></div>

<!-- 🧠 HEADER -->
<div class="panel">
  <div class="title">NexPath AI</div>
  <div>Live Humanitarian System</div>
  <button class="btn">System Active</button>
</div>

<!-- 📩 FORM -->
<div class="panel">
  <h2>Request Help</h2>
  <input id="email" placeholder="Email (optional)">
  <textarea id="message" placeholder="Describe your situation..."></textarea>
  <button class="btn" onclick="submitRequest()">Submit</button>
</div>

<!-- 📊 ADMIN -->
<div class="panel">
  <h2>Live Requests</h2>
  <div id="requests"></div>
</div>

<!-- 🌍 GLOBE -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
const globe = Globe()(document.getElementById('globeBg'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.5;
</script>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let loading = false;

window.submitRequest = async function () {
  if (loading) return;

  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (!message.trim()) return alert("Enter your situation");

  loading = true;

  await addDoc(collection(db, "requests"), {
    email,
    message,
    timestamp: Date.now()
  });

  document.getElementById("email").value = "";
  document.getElementById("message").value = "";

  loading = false;

  loadRequests();
};

async function loadRequests() {
  const container = document.getElementById("requests");
  container.innerHTML = "";

  const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach(doc => {
    const d = doc.data();

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>Email:</b> ${d.email || "N/A"}<br>
      <b>Message:</b> ${d.message}
    `;

    container.appendChild(div);
  });
}

loadRequests();

</script>

</body>
</html>
