<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI Command Center</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #070b14, #000);
      color: white;
      overflow-x: hidden;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
    }

    .left {
      max-width: 520px;
    }

    .title {
      font-size: 52px;
      font-weight: bold;
      background: linear-gradient(90deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #9ca3af;
      margin-top: 10px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 18px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #globeViz {
      width: 520px;
      height: 520px;
      border-radius: 50%;
      box-shadow: 0 0 90px rgba(59,130,246,0.5);
      overflow: hidden;
    }

    /* CONTROL PANEL */
    .dashboard {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      font-size: 13px;
    }

    .status {
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
      display: inline-block;
      margin-right: 6px;
    }

    .dot.red {
      background: #ef4444;
      box-shadow: 0 0 10px #ef4444;
    }

    .dot.yellow {
      background: #facc15;
      box-shadow: 0 0 10px #facc15;
    }
  </style>
</head>

<body>

<!-- DASHBOARD -->
<div class="dashboard">
  <h3>AI Command Center</h3>

  <div class="status"><span><span class="dot green"></span>System</span><span>ACTIVE</span></div>
  <div class="status"><span><span class="dot yellow"></span>Monitoring</span><span>12 ZONES</span></div>
  <div class="status"><span><span class="dot red"></span>Emergency</span><span>3 ALERTS</span></div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="left">
    <div class="title">NexPath AI</div>
    <div class="title">Command Center</div>

    <div class="subtitle">
      Live global humanitarian intelligence system detecting crisis, routing aid, and visualizing global response networks in real time.
    </div>

    <button class="btn">Activate System</button>
  </div>

  <div id="globeViz"></div>

</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
  const world = Globe()
    (document.getElementById('globeViz'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png');

  world.width(520);
  world.height(520);

  // 🌍 Crisis + Aid Nodes
  const points = [
    { lat: 25.276987, lng: 55.296249, size: 0.6, color: 'red', label: 'Dubai Crisis Hub' },
    { lat: -1.2921, lng: 36.8219, size: 0.7, color: 'red', label: 'Kenya Emergency Zone' },
    { lat: 51.5072, lng: -0.1276, size: 0.5, color: 'yellow', label: 'UK Monitoring Hub' },
    { lat: 40.7128, lng: -74.0060, size: 0.5, color: 'blue', label: 'USA Support Grid' }
  ];

  world
    .pointsData(points)
    .pointAltitude('size')
    .pointColor('color')
    .pointLabel('label');

  // 🌐 CONNECTION ARCS (AI ROUTING VISUAL)
  const arcs = [
    { startLat: 25.276987, startLng: 55.296249, endLat: -1.2921, endLng: 36.8219, color: ['#ff0000', '#ff8800'] },
    { startLat: 51.5072, startLng: -0.1276, endLat: 40.7128, endLng: -74.0060, color: ['#00ffcc', '#0066ff'] }
  ];

  world
    .arcsData(arcs)
    .arcColor('color')
    .arcDashLength(0.6)
    .arcDashGap(2)
    .arcDashInitialGap(() => Math.random())
    .arcDashAnimateTime(2500);

  // AUTO ROTATION (CONTROL ROOM FEEL)
  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.6;
</script>

</body>
</html>
