<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Global Intelligence System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #060a14, #000);
      color: white;
      overflow-x: hidden;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
    }

    .left {
      max-width: 520px;
    }

    .title {
      font-size: 52px;
      font-weight: bold;
      background: linear-gradient(90deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #9ca3af;
      margin-top: 10px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 18px;
      background: linear-gradient(90deg,#2563eb,#7c3aed);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #globeViz {
      width: 520px;
      height: 520px;
      border-radius: 50%;
      box-shadow: 0 0 90px rgba(59,130,246,0.5);
      overflow: hidden;
    }

    /* LIVE EVENT FEED */
    .feed {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      overflow: hidden;
    }

    .feed h4 {
      margin: 0 0 10px 0;
      color: #60a5fa;
    }

    .event {
      margin: 6px 0;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* TOP STATUS BAR */
    .statusBar {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 240px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
    .yellow { background: #facc15; box-shadow: 0 0 10px #facc15; }
    .green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

  </style>
</head>

<body>

<!-- STATUS -->
<div class="statusBar">
  <div><span class="dot green"></span>AI Core: ACTIVE</div>
  <div><span class="dot yellow"></span>Signal Scan: RUNNING</div>
  <div><span class="dot red"></span>Emergencies: DETECTED</div>
</div>

<!-- LIVE FEED -->
<div class="feed">
  <h4>Live Humanitarian Feed</h4>
  <div id="feed"></div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="left">
    <div class="title">NexPath AI</div>
    <div class="title">Global Intelligence Layer</div>

    <div class="subtitle">
      Real-time humanitarian AI system simulating global crisis detection, routing, and response intelligence across nations.
    </div>

    <button class="btn">Activate Global System</button>
  </div>

  <div id="globeViz"></div>

</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
  const world = Globe()
    (document.getElementById('globeViz'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png');

  world.width(520);
  world.height(520);

  // 🌍 DYNAMIC CRISIS SIGNALS
  let points = [
    { lat: 25.276987, lng: 55.296249, size: 0.6, color: 'red', label: 'Dubai Emergency Signal' },
    { lat: -1.2921, lng: 36.8219, size: 0.7, color: 'red', label: 'Kenya Crisis Zone' },
    { lat: 51.5072, lng: -0.1276, size: 0.5, color: 'yellow', label: 'UK Monitoring' }
  ];

  world
    .pointsData(points)
    .pointAltitude('size')
    .pointColor('color')
    .pointLabel('label');

  // 🌐 ROUTING ARCS
  world.arcsData([
    {
      startLat: 25.276987,
      startLng: 55.296249,
      endLat: -1.2921,
      endLng: 36.8219,
      color: ['#ff0000', '#ff8800']
    }
  ])
  .arcDashLength(0.5)
  .arcDashGap(2)
  .arcDashAnimateTime(2500);

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.6;

  // 🔴 LIVE FEED SYSTEM
  const feed = document.getElementById("feed");

  const events = [
    "✔ AI detected food shortage signal in East Africa",
    "⚠ Emergency request received from Dubai zone",
    "✔ Aid routing initiated via UK hub",
    "⚠ High-risk displacement pattern detected",
    "✔ Global scan cycle completed"
  ];

  let i = 0;

  setInterval(() => {
    const div = document.createElement("div");
    div.className = "event";
    div.innerText = events[i % events.length];
    feed.prepend(div);

    if (feed.children.length > 6) {
      feed.removeChild(feed.lastChild);
    }

    i++;
  }, 2000);

  // 🔴 PULSE EFFECT (SIMULATED MOVING CRISIS UPDATE)
  setInterval(() => {
    points.push({
      lat: 30 + Math.random() * 20,
      lng: 20 + Math.random() * 40,
      size: 0.5,
      color: 'red',
      label: 'New AI Detected Signal'
    });

    world.pointsData(points);
  }, 5000);

</script>

</body>
</html>
