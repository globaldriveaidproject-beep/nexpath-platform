<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Global Intelligence Evolution Engine</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
    }

    #globe {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 360px;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #00ffe1;
    }

    .card {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .popup {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 320px;
      background: rgba(0,0,0,0.85);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #00ffe1;
      display: none;
      z-index: 20;
    }

    .ai {
      color: #00ffe1;
      font-size: 12px;
      margin-top: 10px;
    }

    .pressure {
      color: #ff5555;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="globe"></div>

<!-- PANEL -->
<div class="panel">

  <div class="title">🌍 NexPath AI Evolution Engine</div>
  <div>Global Intelligence System Active</div>

  <hr>

  <div class="card">Global Impact: <span id="impact">153</span></div>
  <div class="card">Aid Delivered: <span id="aid">57</span></div>
  <div class="card">Active Regions: <span id="regions">12</span></div>

  <div class="card pressure">
    🌐 Global Pressure Index: <span id="pressure">0</span>/100
  </div>

  <hr>

  <div class="card" onclick="triggerAI('UAE')">
    UAE - Food Crisis (CRITICAL)
  </div>

  <div class="card" onclick="triggerAI('Kenya')">
    Kenya - Education Need (HIGH)
  </div>

  <div class="card" onclick="triggerAI('France')">
    France - Volunteers Needed (LOW)
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<!-- GLOBE -->
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

<script>

const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.6;

/* 🌍 GLOBAL MEMORY SYSTEM */
let state = {
  UAE: { level: "CRITICAL", heat: 1.0 },
  Kenya: { level: "HIGH", heat: 0.7 },
  France: { level: "LOW", heat: 0.4 }
};

/* 🌡️ CRISIS DATA BUILDER */
function buildData() {
  return [
    { name:"UAE", lat:25.276987, lng:55.296249, ...state.UAE },
    { name:"Kenya", lat:-1.2921, lng:36.8219, ...state.Kenya },
    { name:"France", lat:48.8566, lng:2.3522, ...state.France }
  ];
}

/* 🌍 RENDER */
function render() {
  world.pointsData(buildData())
    .pointAltitude(d => 0.15 + d.heat * 0.12)
    .pointColor(d => {
      if(d.heat > 0.85) return "red";
      if(d.heat > 0.6) return "orange";
      return "yellow";
    });
}

/* 🌡️ HEAT EVOLUTION */
function evolveWorld() {

  for (let key in state) {

    let drift = (Math.random() * 0.04 - 0.02);
    state[key].heat = Math.max(0.2, Math.min(1, state[key].heat + drift));

  }

  render();
  updatePressure();
}

/* 🌐 GLOBAL PRESSURE ENGINE */
function updatePressure() {

  let total = (state.UAE.heat + state.Kenya.heat + state.France.heat) / 3;
  let pressure = Math.floor(total * 100);

  document.getElementById("pressure").innerText = pressure;
}

/* 🧠 CONTEXT AI ENGINE */
function triggerAI(region) {

  const popup = document.getElementById("popup");
  popup.style.display = "block";

  let s = state[region];

  popup.innerHTML = `
    <b>${region}</b><br><br>
    Severity: ${s.level}<br>

    <div class="ai">🧠 AI ANALYSIS</div>
    ${generateInsight(region, s)}
  `;
}

/* 🧠 EVOLVING AI LOGIC */
function generateInsight(region, s) {

  if(region === "UAE") {
    return `
    Supply chain instability increasing over time.<br>
    Food demand curve exceeding local distribution capacity.<br>
    Recommendation: Immediate intervention escalation.
    `;
  }

  if(region === "Kenya") {
    return `
    Education resource gap fluctuating.<br>
    Infrastructure support partially stabilizing.<br>
    Recommendation: Long-term NGO coordination required.
    `;
  }

  return `
  Volunteer engagement declining trend detected.<br>
  System imbalance between supply and demand.<br>
  Recommendation: Recruitment + awareness expansion needed.
  `;
}

/* 📊 LIVE SYSTEM */
setInterval(() => {

  document.getElementById("impact").innerText = 153 + Math.floor(Math.random()*5);
  document.getElementById("aid").innerText = 57 + Math.floor(Math.random()*2);
  document.getElementById("regions").innerText = 12;

}, 2000);

/* 🔄 WORLD LOOP */
setInterval(evolveWorld, 400);

/* INIT */
render();
updatePressure();

</script>

</body>
</html>
