<!DOCTYPE html>
<html>
<head>
  <title>NexPath AI - Hybrid Intelligence System</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
    }

    #globe {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .title {
      color: #00ffe1;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .popup {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 260px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 12px;
      z-index: 20;
      display: none;
      border: 1px solid #00ffe1;
    }

    .red { color: #ff4d4d; }
    .orange { color: #ffb84d; }
    .yellow { color: #ffd24d; }
  </style>
</head>

<body>

<div id="globe"></div>

<!-- 📊 PANEL -->
<div class="panel">
  <div class="title">🌍 NexPath AI Hybrid System</div>

  <div class="card">Global Impact: <span id="impact">143</span></div>
  <div class="card">Aid Delivered: <span id="aid">56</span></div>
  <div class="card">Active Regions: <span id="regions">12</span></div>

  <hr>

  <div class="card red" onclick="showInfo('UAE', 'CRITICAL Food Crisis - Immediate Aid Required')">
    UAE - Food Crisis (CRITICAL)
  </div>

  <div class="card orange" onclick="showInfo('Kenya', 'HIGH Education Support Needed')">
    Kenya - Education Need (HIGH)
  </div>

  <div class="card yellow" onclick="showInfo('France', 'LOW Volunteer Request Active')">
    France - Volunteers Needed (LOW)
  </div>
</div>

<!-- 📡 POPUP -->
<div id="popup" class="popup"></div>

<!-- 🌍 GLOBE -->
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

<script>
const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('black');

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.6;

/* 🌍 CRISIS DATA */
const data = [
  { name: "UAE", lat: 25.276987, lng: 55.296249, level: "CRITICAL", color: "red" },
  { name: "Kenya", lat: -1.2921, lng: 36.8219, level: "HIGH", color: "orange" },
  { name: "France", lat: 48.8566, lng: 2.3522, level: "LOW", color: "yellow" }
];

world.pointsData(data)
  .pointAltitude(() => 0.15)
  .pointColor(d => d.color);

/* 🧠 CLICK SYSTEM */
world.onPointClick(point => {
  showInfo(point.name, "AI Detected Crisis Zone: " + point.level);
});

/* 📡 POPUP FUNCTION */
function showInfo(location, message) {
  const popup = document.getElementById("popup");
  popup.style.display = "block";
  popup.innerHTML = `
    <b>${location}</b><br><br>
    ${message}
  `;
}

/* 📊 LIVE NUMBERS */
setInterval(() => {
  document.getElementById("impact").innerText = 143 + Math.floor(Math.random() * 5);
  document.getElementById("aid").innerText = 56 + Math.floor(Math.random() * 2);
  document.getElementById("regions").innerText = 12;
}, 2000);
</script>

</body>
</html>
