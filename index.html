<!DOCTYPE html>
<html>
<head>
  <title>NexPath Platform</title>
</head>

<body style="font-family:Arial; background:#0f172a; color:white; text-align:center; padding:40px;">

  <h1>🌍 NexPath AI Platform</h1>
  <p>Global Help & Support System (Live Prototype)</p>

  <h2>Request Help</h2>

  <textarea id="input" placeholder="Describe your situation..." style="width:300px; height:100px;"></textarea>
  <br><br>

  <button onclick="analyze()">Submit</button>

  <p id="output" style="margin-top:20px;"></p>

  <script>
    function analyze() {
      let text = document.getElementById("input").value.toLowerCase();
      let output = [];

if (text.includes("shelter") || text.includes("no place")) {
  output.push("🟥 HIGH PRIORITY: Emergency shelter needed.");
}

if (text.includes("food")) {
  output.push("🟧 MEDIUM PRIORITY: Food support needed.");
}

if (text.includes("child")) {
  output.push("🟥 URGENT: Child support needed immediately.");
}

if (output.length === 0) {
  output.push("🟢 Request received. Community system activated.");
}

document.getElementById("output").innerText = output.join("\n");

      // Save to Firebase (if connected)
      if (window.saveRequest) {
        window.saveRequest(text);
      }
    }
  </script>
  
<!-- Firebase (ADD YOUR CONFIG HERE) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
    authDomain: "nexpath-platform.firebaseapp.com",
    projectId: "nexpath-platform",
    storageBucket: "nexpath-platform.firebasestorage.app",
    messagingSenderId: "1094642467861",
    appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveRequest = async function(text) {
    await addDoc(collection(db, "requests"), {
      message: text,
      time: new Date()
    });
  };
</script>

</body>
</html>
