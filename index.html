<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath AI Geo Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

#globe-container {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.panel {
  position: absolute;
  background: rgba(0,0,0,0.5);
  border: 1px solid cyan;
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.top-right { top: 20px; right: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

</style>
</head>

<body>

<div id="globe-container"></div>

<div class="panel top-right">
  🌍 NexPath AI LIVE
</div>

<div class="panel bottom-right" id="output">
  Click globe to analyze region...
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("globe-container").appendChild(renderer.domElement);

/* EARTH */
const geometry = new THREE.SphereGeometry(5, 64, 64);
const texture = new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg");
const material = new THREE.MeshStandardMaterial({ map: texture });
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

/* LIGHT */
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 10;

/* RAYCAST */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

/* REGION DATA */
function getRegion(lat, lon) {

  if (lat > 20 && lat < 30 && lon > 50 && lon < 60) {
    return {
      name: "UAE",
      level: "CRITICAL",
      msg: "Food supply disruption detected. Immediate aid required."
    };
  }

  if (lat > -5 && lat < 5 && lon > 35 && lon < 45) {
    return {
      name: "Kenya",
      level: "HIGH",
      msg: "Education infrastructure under stress."
    };
  }

  if (lat > 40 && lat < 50 && lon > -5 && lon < 10) {
    return {
      name: "France",
      level: "LOW",
      msg: "Volunteer support demand rising."
    };
  }

  return {
    name: "Unknown Region",
    level: "MONITORING",
    msg: "No major crisis detected. Monitoring conditions."
  };
}

/* CLICK */
window.addEventListener("click", (event) => {

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(globe);

  if (intersects.length > 0) {

    const point = intersects[0].point;

    const lat = 90 - (Math.acos(point.y / 5) * 180 / Math.PI);
    const lon = ((270 + (Math.atan2(point.x, point.z) * 180 / Math.PI)) % 360) - 180;

    const region = getRegion(lat, lon);

    document.getElementById("output").innerHTML = `
      🌍 ${region.name}<br><br>
      Severity: ${region.level}<br><br>
      🧠 AI Analysis:<br>
      ${region.msg}
    `;
  }

});

/* ANIMATE */
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();

/* RESIZE */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
