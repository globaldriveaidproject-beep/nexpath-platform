<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath AI Core System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Orbitron;
  background: black;
  color: white;
  overflow: hidden;
}

#globe-container {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* UI PANEL */
.panel {
  position: absolute;
  background: rgba(0,0,0,0.55);
  border: 1px solid cyan;
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }

.title {
  color: cyan;
  font-size: 14px;
  margin-bottom: 10px;
}

.event {
  margin: 5px 0;
  font-size: 12px;
}

.critical { color: red; }
.high { color: orange; }
.low { color: lime; }

</style>
</head>

<body>

<div id="globe-container"></div>

<!-- UI -->
<div class="panel top-right">
  <div class="title">🌍 NexPath AI CORE</div>
  Impact: <span id="impact">157</span><br>
  Aid: <span id="aid">58</span><br>
  Regions: <span id="regions">12</span>
</div>

<div class="panel bottom-left" id="events">
  <div class="title">🚨 LIVE EVENTS</div>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js";

/* ---------------------------
   🧠 1. GLOBAL STATE ENGINE
----------------------------*/
const state = {
  UAE: { heat: 0.95, level: "CRITICAL" },
  Kenya: { heat: 0.70, level: "HIGH" },
  France: { heat: 0.40, level: "LOW" }
};

/* ---------------------------
   🌍 THREE.JS SETUP
----------------------------*/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.getElementById("globe-container").appendChild(renderer.domElement);

/* EARTH */
const globe = new THREE.Mesh(
  new THREE.SphereGeometry(5, 64, 64),
  new THREE.MeshStandardMaterial({
    map: new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);

scene.add(globe);

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff, 2).position.set(10,10,10));
camera.position.z = 10;

/* ---------------------------
   📡 EVENT SYSTEM
----------------------------*/
let events = [];

function pushEvent(region, level, msg) {

  const event = {
    region,
    level,
    msg,
    time: Date.now()
  };

  events.unshift(event);
  if (events.length > 5) events.pop();

  renderEvents();
}

/* ---------------------------
   🧾 RENDER EVENTS
----------------------------*/
function renderEvents() {

  document.getElementById("events").innerHTML = `
    <div class="title">🚨 LIVE EVENTS</div>
    ${events.map(e => `
      <div class="event ${e.level.toLowerCase()}">
        ${e.region} → ${e.level}<br>
        ${e.msg}
      </div>
    `).join("")}
  `;
}

/* ---------------------------
   🌡️ SIMULATION LOOP
----------------------------*/
function updateSystem() {

  for (let r in state) {

    state[r].heat += (Math.random() * 0.02 - 0.01);
    state[r].heat = Math.max(0.2, Math.min(1, state[r].heat));

    if (state[r].heat > 0.85) {
      pushEvent(r, "CRITICAL", "Escalation detected in region system.");
    }
  }

  document.getElementById("impact").innerText = 157 + Math.floor(Math.random()*3);
  document.getElementById("aid").innerText = 58 + Math.floor(Math.random()*2);
  document.getElementById("regions").innerText = 12;
}

/* ---------------------------
   🔁 LOOP ENGINE
----------------------------*/
setInterval(updateSystem, 3000);

/* ---------------------------
   🎥 ANIMATION
----------------------------*/
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();

/* RESIZE */
addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
