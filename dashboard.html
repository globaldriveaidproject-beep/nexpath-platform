<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allRequests = [];
let allDonors = [];

/* =========================
   💰 LOAD DONORS
========================= */
async function loadDonors() {
  const snap = await getDocs(collection(db, "donations"));

  let donors = [];
  snap.forEach(d => donors.push(d.data()));

  allDonors = donors;
}

/* =========================
   🤖 DONOR MATCH ENGINE
========================= */
function findBestDonors(request) {
  if (!allDonors || allDonors.length === 0) return [];

  return [...allDonors]
    .sort((a, b) => (b.amount || 0) - (a.amount || 0))
    .slice(0, 3);
}

/* =========================
   💰 DONATION TOTALS
========================= */
async function getDonationTotals() {
  const snap = await getDocs(collection(db, "donations"));

  let totals = {};
  snap.forEach(d => {
    const data = d.data();
    totals[data.requestId] = (totals[data.requestId] || 0) + Number(data.amount || 0);
  });

  return totals;
}

/* =========================
   📊 LOAD DATA
========================= */
async function loadData() {

  await loadDonors();

  const snap = await getDocs(collection(db, "requests"));
  const donationTotals = await getDonationTotals();

  allRequests = [];

  snap.forEach(d => {
    let data = d.data();

    allRequests.push({
      id: d.id,
      ...data,
      totalDonations: donationTotals[d.id] || 0
    });
  });

  render(allRequests);
  updateSummary();
}

/* =========================
   📊 SUMMARY
========================= */
function updateSummary() {
  document.getElementById("summary").innerHTML = `
    Total Cases: ${allRequests.length} |
    Critical: ${allRequests.filter(r => r.priority === "CRITICAL").length}
  `;
}

/* =========================
   🚨 ALERT SYSTEM
========================= */
function showAlert(r) {
  let alertBox = document.getElementById("alert");

  if (!alertBox) {
    alertBox = document.createElement("div");
    alertBox.id = "alert";
    alertBox.style = `
      background:#7f1d1d;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      font-weight:bold;
    `;
    document.body.prepend(alertBox);
  }

  alertBox.innerHTML = `🚨 CRITICAL ALERT: ${r.message}`;

  setTimeout(() => {
    alertBox.innerHTML = "";
  }, 5000);
}

/* =========================
   📊 RENDER
========================= */
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(r => {

    let color =
      r.priority === "CRITICAL" ? "red" :
      r.priority === "HIGH" ? "orange" : "lightgreen";

    let donors = findBestDonors(r);

    // 🚨 trigger alert
    if (r.priority === "CRITICAL") {
      showAlert(r);
    }

    list.innerHTML += `
      <div style="border:1px solid ${color};padding:10px;margin:10px;border-radius:10px;">

        <h3 style="color:${color}">${r.priority}</h3>

        <p><b>Message:</b> ${r.message}</p>
        <p><b>AI Score:</b> ${r.urgencyScore || 0}</p>
        <p><b>Category:</b> ${r.category || "N/A"}</p>

        <p><b>💰 Total Donations:</b> $${r.totalDonations || 0}</p>

        <h4>🤖 Recommended Donors:</h4>
        <ul>
          ${donors.length
            ? donors.map(d => `<li>${d.donorEmail || "anonymous"} - $${d.amount || 0}</li>`).join("")
            : "<li>No donors yet</li>"
          }
        </ul>

        <p><b>AI Action:</b> ${
          r.priority === "CRITICAL"
            ? "🚨 Immediate funding required"
            : "💡 Standard monitoring"
        }</p>

      </div>
    `;
  });
}

/* =========================
   🚀 INIT
========================= */
loadData();
setInterval(loadData, 5000);

</script>
