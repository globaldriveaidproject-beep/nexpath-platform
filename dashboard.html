<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NexPath Emergency Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #00f5ff;
  }

  .card {
    background: rgba(255,255,255,0.05);
    margin: 10px 0;
    padding: 15px;
    border-radius: 12px;
    border-left: 5px solid gray;
    position: relative;
  }

  .CRITICAL { border-left-color: red; }
  .HIGH { border-left-color: orange; }
  .URGENT { border-left-color: #ff4d4d; }
  .NORMAL { border-left-color: #00f5ff; }

  .tag {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    display: inline-block;
  }

  .btn {
    margin-top: 10px;
    padding: 6px 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .resolve {
    background: #00f5ff;
    color: black;
  }
</style>
</head>

<body>

<h1>🚨 NexPath Emergency Control Room</h1>

<div id="data"></div>

<audio id="alertSound">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");
const alertSound = document.getElementById("alertSound");

function detectPriority(message) {
  message = message.toLowerCase();

  if (message.includes("shelter") || message.includes("homeless")) return "CRITICAL";
  if (message.includes("food")) return "HIGH";
  if (message.includes("child")) return "URGENT";
  return "NORMAL";
}

function playAlert(priority) {
  if (priority === "CRITICAL") {
    alertSound.play();
    alert("🚨 CRITICAL ALERT: Immediate attention required!");
  }
}

onSnapshot(collection(db, "requests"), (snapshot) => {
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    let data = docSnap.data();
    let id = docSnap.id;

    let priority = detectPriority(data.message);

    playAlert(priority);

    let div = document.createElement("div");
    div.className = `card ${priority}`;

    div.innerHTML = `
      <div class="tag">${priority}</div><br>
      <strong>${data.message}</strong><br>
      <small>${new Date(data.time.seconds * 1000).toLocaleString()}</small><br>

      <button class="btn resolve" onclick="resolve('${id}')">Mark Resolved</button>
    `;

    container.appendChild(div);
  });
});

// Delete / resolve request
window.resolve = async function(id) {
  await deleteDoc(doc(db, "requests", id));
};
</script>

</body>
</html>
