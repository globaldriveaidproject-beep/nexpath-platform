<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NexPath Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    padding: 20px;
  }

  h1 {
    color: #00f5ff;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.05);
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    border-left: 4px solid #00f5ff;
  }
</style>
</head>

<body>

<h1>📊 NexPath Live Dashboard</h1>

<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");

onSnapshot(collection(db, "requests"), (snapshot) => {
  container.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <strong>Request:</strong> ${data.message} <br>
      <small>${new Date(data.time.seconds * 1000).toLocaleString()}</small>
    `;

    container.appendChild(div);
  });
});
</script>

</body>
</html>
