<!DOCTYPE html>
<html>
<head>
  <title>NexPath Control Room</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #00f5ff;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 25%;
    }

    .card h2 {
      margin: 0;
      font-size: 28px;
      color: #00f5ff;
    }

    .requests {
      padding: 20px;
    }

    .request {
      background: rgba(255,255,255,0.05);
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    .critical { border-left: 5px solid red; }
    .high { border-left: 5px solid orange; }
    .low { border-left: 5px solid green; }

    button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #00f5ff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00c2cc;
    }
  </style>
</head>

<body>

<h1>🚨 NexPath Emergency Control Room</h1>

<div class="stats">
  <div class="card">
    <h2 id="total">0</h2>
    <p>Total Requests</p>
  </div>

  <div class="card">
    <h2 id="critical">0</h2>
    <p>Critical Cases</p>
  </div>

  <div class="card">
    <h2 id="resolved">0</h2>
    <p>Resolved</p>
  </div>
</div>

<div class="requests" id="requests"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const requestsDiv = document.getElementById("requests");

onSnapshot(collection(db, "requests"), (snapshot) => {
  requestsDiv.innerHTML = "";

  let total = 0;
  let critical = 0;
  let resolved = 0;

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    total++;

    if (data.priority === "CRITICAL") critical++;
    if (data.status === "resolved") resolved++;

    const div = document.createElement("div");
    div.className = "request " + data.priority.toLowerCase();

    div.innerHTML = `
      <strong>${data.priority}</strong><br>
      ${data.message}<br>
      ${new Date(data.createdAt.seconds * 1000).toLocaleString()}<br>
      <button onclick="resolve('${docSnap.id}')">Mark Resolved</button>
    `;

    requestsDiv.appendChild(div);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("critical").innerText = critical;
  document.getElementById("resolved").innerText = resolved;
});

window.resolve = async function (id) {
  await updateDoc(doc(db, "requests", id), {
    status: "resolved"
  });
};
</script>

</body>
</html>
