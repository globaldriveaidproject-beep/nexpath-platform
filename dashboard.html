<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mankind Global Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      border-left: 5px solid #00ffcc;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .critical {
      border-left: 5px solid red;
    }

    .high {
      border-left: 5px solid orange;
    }

    .medium {
      border-left: 5px solid yellow;
    }

    .low {
      border-left: 5px solid green;
    }
  </style>
</head>

<body>

<h1>🌍 Mankind Global AI Dashboard</h1>

<div id="requests"></div>

<script>

/* =========================
   📦 SAMPLE REQUESTS
========================= */

let requests = [
  {
    message: "We need urgent food and water for 20 people",
    category: "Food",
    urgencyScore: 95,
    priority: "CRITICAL"
  },
  {
    message: "School supplies needed for children",
    category: "Education",
    urgencyScore: 70,
    priority: "HIGH"
  },
  {
    message: "Looking for volunteers",
    category: "Volunteering",
    urgencyScore: 40,
    priority: "MEDIUM"
  }
];


/* =========================
   👤 DONORS DATABASE
========================= */

let donors = [
  {
    name: "Global Food Aid",
    donorEmail: "donor1@email.com",
    interests: ["Food"]
  },
  {
    name: "Education Fund Org",
    donorEmail: "donor2@email.com",
    interests: ["Education"]
  },
  {
    name: "Volunteer Group",
    donorEmail: "donor3@email.com",
    interests: ["Volunteering"]
  }
];


/* =========================
   🎯 FIND MATCHING DONORS
========================= */

function findBestDonors(request) {
  return donors.filter(d => d.interests.includes(request.category));
}


/* =========================
   📧 AUTO EMAIL ALERT SYSTEM
========================= */

function triggerEmailAlert(request, donorsList) {

  if (request.priority !== "CRITICAL") return;

  donorsList.forEach(donor => {

    const subject = encodeURIComponent("🚨 Urgent Help Needed - Global Drive Aid");

    const body = encodeURIComponent(`
Hello,

An urgent request has been detected on the platform.

📌 Message:
${request.message}

📊 AI Urgency Score: ${request.urgencyScore}
📂 Category: ${request.category}

This case requires immediate attention.

Please log into the platform or respond as soon as possible.

— Mankind Global / Helping Hand Community
Founder: Tidimalo Konate
    `);

    const mailtoLink = `mailto:${donor.donorEmail}?subject=${subject}&body=${body}`;

    console.log("📧 Email Prepared:", mailtoLink);

    // Opens email draft
    window.open(mailtoLink, "_blank");
  });
}


/* =========================
   🎨 RENDER DASHBOARD
========================= */

function render() {

  let container = document.getElementById("requests");
  container.innerHTML = "";

  requests.forEach(r => {

    let donorsMatched = findBestDonors(r);

    // 🚨 Trigger alerts
    triggerEmailAlert(r, donorsMatched);

    let div = document.createElement("div");
    div.className = "card " + r.priority.toLowerCase();

    div.innerHTML = `
      <h3>${r.message}</h3>
      <p>Category: ${r.category}</p>
      <p>Urgency Score: ${r.urgencyScore}</p>
      <p>Priority: ${r.priority}</p>
      <p>Matched Donors: ${donorsMatched.map(d => d.name).join(", ")}</p>
    `;

    container.appendChild(div);
  });
}


/* =========================
   🚀 START SYSTEM
========================= */

render();

</script>

</body>
</html>
