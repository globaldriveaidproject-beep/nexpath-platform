<!DOCTYPE html>
<html>
<head>
  <title>NexPath Control Room</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #00f5ff;
    }

    .filters {
      margin: 20px 0;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border-left: 5px solid gray;
    }

    .CRITICAL { border-left-color: red; }
    .HIGH { border-left-color: orange; }
    .LOW { border-left-color: green; }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .resolve {
      background: #00f5ff;
    }
  </style>
</head>

<body>

<h1>🚨 NexPath Emergency Control Room</h1>

<div class="filters">
  <select id="filter" onchange="loadData()">
    <option value="ALL">All</option>
    <option value="CRITICAL">CRITICAL</option>
    <option value="HIGH">HIGH</option>
    <option value="LOW">LOW</option>
  </select>
</div>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];

const list = document.getElementById("list");

function render(data) {
  list.innerHTML = "";

  data.sort((a,b) => {
    const order = { "CRITICAL": 1, "HIGH": 2, "LOW": 3 };
    return order[a.priority] - order[b.priority];
  });

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card " + item.priority;

    div.innerHTML = `
      <b>Message:</b> ${item.message} <br>
      <b>Priority:</b> ${item.priority} <br>
      <b>Category:</b> ${item.category} <br>
      <b>Location:</b> ${item.location} <br><br>

      <button class="resolve" onclick="resolve('${item.id}')">Mark Resolved</button>
    `;

    list.appendChild(div);
  });
}

// 🔄 REALTIME FIREBASE LISTENER
onSnapshot(collection(db, "requests"), (snapshot) => {
  allData = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  render(allData);
});

// FILTER SYSTEM
window.loadData = function () {
  const value = document.getElementById("filter").value;

  if (value === "ALL") {
    render(allData);
  } else {
    render(allData.filter(x => x.priority === value));
  }
};

// RESOLVE SYSTEM
window.resolve = async function (id) {
  await updateDoc(doc(db, "requests", id), {
    status: "resolved"
  });

  alert("Request resolved ✔");
};
</script>

</body>
</html>
