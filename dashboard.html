<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexPath AI - Humanitarian System</title>

  <style>
    body {
      font-family: Arial;
      background: #05070d;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #0a0f1c;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #0a0f1c;
      border: 1px solid #1c2333;
      color: white;
      border-radius: 8px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #00e676;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    h2 {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  🌍 NexPath AI — Humanitarian Intelligence System
</header>

<div class="container">

  <!-- REQUEST FORM -->
  <h2>Request Help</h2>

  <select id="category">
    <option value="food">Food</option>
    <option value="medical">Medical</option>
    <option value="shelter">Shelter</option>
  </select>

  <textarea id="message" placeholder="Describe your situation..."></textarea>

  <button onclick="submitRequest()">Submit Request</button>

  <!-- DASHBOARD -->
  <h2>Live Requests Dashboard</h2>
  <div id="list"></div>

</div>

<script>
let requests = [];

let donors = [
  { donorEmail: "aid@global.org", interests: ["food","medical"], amount: 500 },
  { donorEmail: "help@humanity.org", interests: ["shelter"], amount: 300 },
  { donorEmail: "care@world.org", interests: ["food","shelter"], amount: 700 }
];

function analyzeUrgency(text) {
  let score = 0;

  if (!text) return score;

  text = text.toLowerCase();

  if (text.includes("urgent")) score += 30;
  if (text.includes("hungry")) score += 25;
  if (text.includes("danger")) score += 40;
  if (text.includes("homeless")) score += 35;
  if (text.includes("help")) score += 10;

  return score;
}

function detectPriority(score) {
  if (score >= 60) return "CRITICAL";
  if (score >= 30) return "HIGH";
  return "NORMAL";
}

function findBestDonors(request) {
  if (!request || !request.category) return [];

  return donors
    .map(donor => {
      let score = 0;

      if (donor.interests.includes(request.category)) {
        score += 50;
      }

      if (donor.amount >= request.urgencyScore * 2) {
        score += 30;
      }

      if (request.priority === "CRITICAL") {
        score += 20;
      }

      return { ...donor, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

function submitRequest() {
  let category = document.getElementById("category").value;
  let message = document.getElementById("message").value;

  let urgencyScore = analyzeUrgency(message);
  let priority = detectPriority(urgencyScore);

  let newRequest = {
    id: Date.now(),
    category,
    message,
    urgencyScore,
    priority,
    totalDonations: Math.floor(Math.random() * 500)
  };

  requests.push(newRequest);
  render(requests);

  document.getElementById("message").value = "";
}

function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(r => {

    let color =
      r.priority === "CRITICAL" ? "#ff3b3b" :
      r.priority === "HIGH" ? "#ff9800" : "#00e676";

    let donors = findBestDonors(r);

    let progress = Math.min((r.totalDonations / 1000) * 100, 100);

    list.innerHTML += `
      <div style="
        border:1px solid ${color};
        padding:15px;
        margin:15px 0;
        border-radius:12px;
        background:#0a0f1c;
        box-shadow:0 0 15px ${color}33;
      ">

        <h3 style="color:${color};">
          ${r.priority}
        </h3>

        <p><b>Category:</b> ${r.category}</p>

        <p>${r.message}</p>

        <p><b>AI Score:</b> ${r.urgencyScore}</p>

        <!-- PROGRESS -->
        <div style="margin:10px 0;">
          <div style="height:10px;background:#222;border-radius:10px;">
            <div style="
              width:${progress}%;
              height:10px;
              border-radius:10px;
              background:${color};
              transition:0.5s;
            "></div>
          </div>
          <small>$${r.totalDonations} raised</small>
        </div>

        <!-- DONORS -->
        <p><b>AI Recommended Donors:</b></p>
        <ul>
          ${
            donors.length > 0
              ? donors.map(d =>
                  `<li>${d.donorEmail} — $${d.amount} (Score: ${d.score})</li>`
                ).join("")
              : "<li>No match yet</li>"
          }
        </ul>

        <!-- AI ACTION -->
        <p>
          <b>AI Action:</b>
          ${
            r.priority === "CRITICAL"
              ? "🚨 Deploy emergency funding"
              : "📊 Monitor & match donors"
          }
        </p>

      </div>
    `;
  });
}
</script>

</body>
</html>
