<!DOCTYPE html>
<html>
<head>
  <title>NexPath Control Room</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;padding:20px">

<h1>🚨 NexPath Emergency Control Room</h1>

<p>Live global humanitarian requests</p>

<!-- FILTERS -->
<div style="margin:20px 0;">
  <button onclick="filter('ALL')">All</button>
  <button onclick="filter('CRITICAL')">Critical</button>
  <button onclick="filter('HIGH')">High</button>
  <button onclick="filter('LOW')">Low</button>
</div>

<!-- DASHBOARD -->
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allRequests = [];

// 🔄 LOAD DATA
async function loadData() {
  const snap = await getDocs(collection(db, "requests"));

  allRequests = [];

  snap.forEach(doc => {
    allRequests.push(doc.data());
  });

  render(allRequests);
}

// 📊 RENDER DASHBOARD
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(r => {

    let color = "white";

    if (r.priority === "CRITICAL") color = "red";
    else if (r.priority === "HIGH") color = "orange";
    else color = "lightgreen";

    list.innerHTML += `
      <div style="
        border:1px solid ${color};
        padding:10px;
        margin:10px;
        border-radius:10px;
      ">
        <h3 style="color:${color}">${r.priority}</h3>
        <p><b>Message:</b> ${r.message}</p>
        <p><b>Category:</b> ${r.category}</p>
        <p><b>Email:</b> ${r.email}</p>
        <p><b>Status:</b> ${r.status}</p>
        <p><b>Time:</b> ${new Date(r.createdAt).toLocaleString()}</p>
      </div>
    `;
  });
}

// 🎯 FILTER SYSTEM
window.filter = function(type) {
  if (type === "ALL") {
    render(allRequests);
  } else {
    let filtered = allRequests.filter(r => r.priority === type);
    render(filtered);
  }
};

// 🚀 AUTO LOAD
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
