<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allRequests = [];
let allDonors = [];

/* =========================
   💰 LOAD DONORS
========================= */
async function loadDonors() {
  const snap = await getDocs(collection(db, "donations"));

  let donors = [];

  snap.forEach(d => {
    donors.push(d.data());
  });

  allDonors = donors;
}

/* =========================
   🤖 AUTO MATCH ENGINE
========================= */
function findBestDonors(request) {
  if (!allDonors.length) return [];

  // simple logic: highest donations = priority donors
  let ranked = [...allDonors]
    .sort((a, b) => b.amount - a.amount)
    .slice(0, 3);

  return ranked;
}

/* =========================
   💰 DONATION TOTALS
========================= */
async function getDonationTotals() {
  const snap = await getDocs(collection(db, "donations"));

  let totals = {};
  snap.forEach(d => {
    const data = d.data();
    totals[data.requestId] = (totals[data.requestId] || 0) + Number(data.amount);
  });

  return totals;
}

/* =========================
   📊 LOAD DATA
========================= */
async function loadData() {

  await loadDonors();

  const snap = await getDocs(collection(db, "requests"));
  const donationTotals = await getDonationTotals();

  allRequests = [];

  snap.forEach(d => {
    let data = d.data();

    allRequests.push({
      id: d.id,
      ...data,
      totalDonations: donationTotals[d.id] || 0
    });
  });

  render(allRequests);
  updateSummary();
}

/* =========================
   📊 SUMMARY
========================= */
function updateSummary() {
  document.getElementById("summary").innerHTML = `
    Total Cases: ${allRequests.length} |
    Critical: ${allRequests.filter(r => r.priority === "CRITICAL").length}
  `;
}

/* =========================
   📊 RENDER
========================= */
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(r => {

    let color =
      r.priority === "CRITICAL" ? "red" :
      r.priority === "HIGH" ? "orange" : "lightgreen";

    let donors = findBestDonors(r);

    list.innerHTML += `
      <div style="border:1px solid ${color};padding:10px;margin:10px;border-radius:10px;">

        <h3 style="color:${color}">${r.priority}</h3>

        <p><b>Message:</b> ${r.message}</p>
        <p><b>AI Score:</b> ${r.urgencyScore || 0}</p>
        <p><b>Category:</b> ${r.category}</p>

        <p><b>💰 Total Donations:</b> $${r.totalDonations}</p>

        <h4>🤖 Recommended Donors:</h4>
        <ul>
          ${donors.map(d => `<li>${d.donorEmail} - $${d.amount}</li>`).join("")}
        </ul>

        <p><b>AI Action:</b> ${
          r.priority === "CRITICAL"
            ? "🚨 Immediate funding required"
            : "💡 Standard monitoring"
        }</p>

      </div>
    `;
  });
}

/* =========================
   🚀 INIT
========================= */
loadData();
setInterval(loadData, 5000);

</script>
