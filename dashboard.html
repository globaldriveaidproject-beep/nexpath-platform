<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allRequests = [];
let allDonors = [];

/* =========================
   💰 LOAD DONORS
========================= */
async function loadDonors() {
  const snap = await getDocs(collection(db, "donors"));

  allDonors = [];

  snap.forEach(d => {
    allDonors.push(d.data());
  });
}

/* =========================
   🤖 SMART MATCH ENGINE
========================= */
function findBestDonors(request) {
  if (!allDonors.length) return [];

  let scored = allDonors.map(donor => {
    let score = 0;

    // 🎯 Match category
    if (donor.category === request.category) score += 50;

    // 💰 Donation strength
    score += Number(donor.amount || 0);

    // 🚨 Urgency boost
    if (request.priority === "CRITICAL") score += 100;
    if (request.priority === "HIGH") score += 50;

    return { ...donor, score };
  });

  return scored
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

/* =========================
   💰 TOTAL DONATIONS
========================= */
async function getDonationTotals() {
  const snap = await getDocs(collection(db, "donors"));

  let total = 0;

  snap.forEach(d => {
    total += Number(d.data().amount || 0);
  });

  return total;
}

/* =========================
   📊 LOAD DATA
========================= */
async function loadData() {

  await loadDonors();

  const snap = await getDocs(collection(db, "requests"));
  const totalDonations = await getDonationTotals();

  allRequests = [];

  snap.forEach(d => {
    allRequests.push({
      id: d.id,
      ...d.data()
    });
  });

  render(allRequests);
  updateSummary(totalDonations);
}

/* =========================
   📊 SUMMARY
========================= */
function updateSummary(totalDonations) {
  document.getElementById("summary").innerHTML = `
    🌍 Total Cases: ${allRequests.length} <br>
    🚨 Critical: ${allRequests.filter(r => r.priority === "CRITICAL").length} <br>
    💰 Global Donations: $${totalDonations}
  `;
}

/* =========================
   📊 RENDER
========================= */
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(r => {

    let color =
      r.priority === "CRITICAL" ? "red" :
      r.priority === "HIGH" ? "orange" : "lightgreen";

    let donors = findBestDonors(r);

    list.innerHTML += `
      <div style="border:1px solid ${color};padding:15px;margin:10px;border-radius:12px;">

        <h3 style="color:${color}">${r.priority}</h3>

        <p><b>🌍 Case:</b> ${r.message}</p>
        <p><b>📦 Category:</b> ${r.category}</p>

        <h4>🤖 Smart Matched Donors:</h4>
        <ul>
          ${donors.map(d => `<li>${d.email || "anonymous"} - $${d.amount} (score: ${d.score})</li>`).join("")}
        </ul>

        <p><b>AI Action:</b> ${
          r.priority === "CRITICAL"
            ? "🚨 Immediate global escalation"
            : "🌐 Active monitoring"
        }</p>

      </div>
    `;
  });
}

/* =========================
   🚀 INIT
========================= */
loadData();
setInterval(loadData, 5000);

</script>
