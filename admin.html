<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath Admin</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
  }

  input {
    width: 90%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00f5ff;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #00c2cc;
  }

  h2 {
    color: #00f5ff;
  }
</style>
</head>

<body>

<div class="box">
  <h2>🔐 NexPath Admin Panel</h2>
  <p>Enter Admin Key</p>

  <input type="password" id="key" placeholder="Admin key">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login() {
  const key = document.getElementById("key").value;

  if (key === "nexpath-admin-2026") {
    document.getElementById("msg").innerText = "✔ Access granted...";
    
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } else {
    document.getElementById("msg").innerText = "❌ Invalid admin key";
  }
}
</script>

</body>
</html>
