<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath Admin</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
  }

  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00f5ff;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #00c2cc;
  }

  #msg {
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>🔐 NexPath Admin Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "✔ Access granted...";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    })
    .catch(() => {
      document.getElementById("msg").innerText = "❌ Invalid login";
    });
};
</script>

</body>
</html>
