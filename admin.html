<!DOCTYPE html>
<html>
<head>
  <title>NexPath Admin Panel</title>
</head>

<body style="font-family:Arial;background:#020617;color:white;text-align:center;padding:40px">

<h1>🔐 NexPath Admin Control Panel</h1>

<input id="pass" type="password" placeholder="Enter Admin Key" />
<br><br>

<button onclick="login()">Login</button>

<div id="panel" style="display:none;margin-top:30px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZuksXvvht9xPUTX32uOQx7h8ODvuRwJo",
  authDomain: "nexpath-platform.firebaseapp.com",
  projectId: "nexpath-platform",
  storageBucket: "nexpath-platform.firebasestorage.app",
  messagingSenderId: "1094642467861",
  appId: "1:1094642467861:web:a60226b4d96b57a2c8fa1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const panel = document.getElementById("panel");

// SIMPLE LOGIN (replace later with real auth)
window.login = function () {
  let key = document.getElementById("pass").value;

  if (key === "nexpath-admin") {
    panel.style.display = "block";
    loadRequests();
  } else {
    alert("Wrong access key");
  }
};

function loadRequests() {
  onSnapshot(collection(db, "requests"), (snapshot) => {
    panel.innerHTML = "<h2>Live Cases</h2>";

    snapshot.forEach(docSnap => {
      let data = docSnap.data();
      let id = docSnap.id;

      let div = document.createElement("div");
      div.style = "background:#111827;margin:10px;padding:10px;border-radius:10px";

      div.innerHTML = `
        <strong>${data.message}</strong><br><br>
        <button onclick="assign('${id}')">Assign Volunteer</button>
      `;

      panel.appendChild(div);
    });
  });
}

// Assign case
window.assign = async function(id) {
  alert("Assigned to volunteer ✔ (simulation layer)");
};
</script>

</body>
</html>
